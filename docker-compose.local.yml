# Local development stack — mirrors EC2 db + postgrest services
# Usage: docker compose -f docker-compose.local.yml up -d
# Ports: Postgres 5433, PostgREST 3001 (avoids conflicts with local installs)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: websites
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGREST_PASSWORD: ${POSTGREST_PASSWORD:-localdev}
    volumes:
      - pgdata-local:/var/lib/postgresql/data
      - ./infra/ec2-compose/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d websites"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    environment:
      PGRST_DB_URI: "postgres://authenticator:${POSTGREST_PASSWORD:-localdev}@db:5432/websites"
      PGRST_DB_ANON_ROLE: "web_anon"
      PGRST_DB_PRE_CONFIG: "pgrst.pre_config"
      PGRST_SERVER_PORT: "3000"
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-local:
