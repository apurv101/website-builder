services:
  website-builder:
    build: .
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/root/.openclaw
      - ./config.json:/root/.openclaw/config.json:ro
      - ./workspace:/app:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Add your API keys here or use a .env file
      # - ANTHROPIC_API_KEY=
      # - OPENAI_API_KEY=

volumes:
  openclaw-data:
